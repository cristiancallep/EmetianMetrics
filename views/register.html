<!doctype html>
<html lang="es">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>EmetianMetrics - Registro</title>
	<link rel="stylesheet" href="../styles/login.css" />
	<link rel="icon" href="assets/public/icono_pg.png" />
</head>
<body>
	<main class="split">
		<div class="left">
			<div class="hero-text">
				<h1>Crea tu cuenta y empieza a seguir el mercado cripto</h1>
				<p class="lead">Después podrás guardar tus monedas favoritas, comparar su evolución y revisar tus datos desde un solo lugar.</p>
			</div>
			<section class="card" aria-labelledby="register-title">
				<h2 id="register-title">Registrarse</h2>
				<form class="login-form" action="../backend/auth/register.php" method="post" novalidate>
					<div class="field">
						<label for="name">Nombre completo</label>
						<input id="name" name="name" type="text" required placeholder="Tu nombre" />
					</div>
					<div class="field">
						<label for="email">Correo electrónico</label>
						<input id="email" name="email" type="email" required placeholder="tu@correo.com" />
					</div>
					<div class="field">
						<label for="password">Contraseña</label>
						<input id="password" name="password" type="password" required placeholder="Crea una contraseña" />
					</div>
					<div class="field">
						<label for="confirm_password">Confirmar contraseña</label>
						<input id="confirm_password" name="confirm_password" type="password" required placeholder="Repite tu contraseña" />
					</div>
					<button type="submit" class="btn-primary">Crear cuenta</button>
				</form>
				<p class="signup">¿Ya tienes cuenta? <a href="../index.html">Inicia sesión</a></p>
			</section>
		</div>
		<div class="right">
			<img class="hero-img" src="../assets/public/hero.png" alt="Ilustración" />
		</div>
	</main>
</body>
</html>
