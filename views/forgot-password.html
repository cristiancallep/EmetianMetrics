<!doctype html>
<html lang="es">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>EmetianMetrics - Recuperar contraseña</title>
	<link rel="stylesheet" href="../styles/login.css" />
    <link rel="icon" href="assets/public/icono_pg.png" />
</head>
<body>
	<main class="split">
		<div class="left">
			<div class="hero-text">
				<h1>Recupera el acceso a tu cuenta</h1>
				<p class="lead">Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.</p>
			</div>
			<section class="card" aria-labelledby="forgot-title">
				<h2 id="forgot-title">¿Olvidaste tu contraseña?</h2>
				<form class="login-form" action="../backend/auth/forgot_request.php" method="post" novalidate>
					<div class="field">
						<label for="email">Correo electrónico</label>
						<input id="email" name="email" type="email" required placeholder="tu@correo.com" />
					</div>
					<p class="helper-text">Te enviaremos instrucciones para crear una nueva contraseña.</p>
					<button type="submit" class="btn-primary">Enviar enlace</button>
				</form>
				<p class="signup"><a href="login.html">Volver al inicio de sesión</a></p>
			</section>
		</div>
		<div class="right">
			<img class="hero-img" src="../assets/public/hero.png" alt="Ilustración" />
		</div>
	</main>
</body>
</html>
