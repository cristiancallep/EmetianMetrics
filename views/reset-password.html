<!doctype html>
<html lang="es">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>EmetianMetrics - Restablecer contraseña</title>
	<link rel="stylesheet" href="../styles/login.css" />
	<link rel="icon" href="../assets/public/icono_pg.png" />
</head>
<body>
	<main class="split">
		<div class="left">
			<div class="hero-text">
				<h1>Restablece tu contraseña</h1>
				<p class="lead">Escribe una nueva contraseña para volver a entrar a tu cuenta.</p>
			</div>
			<section class="card" aria-labelledby="reset-title">
				<h2 id="reset-title">Nueva contraseña</h2>
				<p id="statusMessage" class="status-message"></p>
				<form class="login-form" action="../backend/auth/reset_password.php" method="post" novalidate>
					<input id="token" name="token" type="hidden" />
					<div class="field">
						<label for="password">Contraseña nueva</label>
						<input id="password" name="password" type="password" required placeholder="Nueva contraseña" />
					</div>
					<div class="field">
						<label for="confirm_password">Confirmar contraseña</label>
						<input id="confirm_password" name="confirm_password" type="password" required placeholder="Repite la contraseña" />
					</div>
					<button type="submit" class="btn-primary">Guardar contraseña</button>
				</form>
				<p class="signup"><a href="../index.html">Volver al inicio de sesión</a></p>
			</section>
		</div>
		<div class="right">
			<img class="hero-img" src="../assets/public/hero.png" alt="Ilustración" />
		</div>
	</main>
	<script>
		const params = new URLSearchParams(window.location.search);
		const token = params.get('token');
		const error = params.get('error');
		const tokenInput = document.getElementById('token');
		const statusMessage = document.getElementById('statusMessage');

		if (tokenInput) {
			tokenInput.value = token || '';
		}

		if (!token) {
			statusMessage.textContent = 'No se encontró un token válido.';
			statusMessage.className = 'status-message error';
		} else if (error === 'missing_fields') {
			statusMessage.textContent = 'Completa todos los campos.';
			statusMessage.className = 'status-message error';
		} else if (error === 'password_mismatch') {
			statusMessage.textContent = 'Las contraseñas no coinciden.';
			statusMessage.className = 'status-message error';
		} else if (error === 'invalid_token') {
			statusMessage.textContent = 'El enlace expiró o no es válido.';
			statusMessage.className = 'status-message error';
		} else {
			statusMessage.textContent = 'Escribe tu nueva contraseña.';
			statusMessage.className = 'status-message';
		}
	</script>
</body>
</html>
