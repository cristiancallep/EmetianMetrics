<!doctype html>
<html lang="es">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>EmetianMetrics - Inicio de sesión</title>
	<link rel="stylesheet" href="../styles/login.css" />
	<link rel="icon" href="../assets/public/icono_pg.png" />
</head>
<body>
	<main class="split">
		<div class="left">
			<div class="hero-text">
				<h1>¿Listo para comenzar tu historia con las criptomonedas?</h1>
				<p class="lead">Consulta precios y gráficos en tiempo real. Más adelante podrás guardar tus criptomonedas favoritas.</p>
			</div>
			<section class="card" aria-labelledby="login-title">
				<h2 id="login-title">Iniciar sesión</h2>
				<p id="statusMessage" class="status-message"></p>
				<form class="login-form" action="../backend/auth/login.php" method="post" novalidate>
					<div class="field">
						<label for="email">Correo electrónico</label>
						<input id="email" name="email" type="email" required placeholder="tu@correo.com" />
					</div>
					<div class="field">
						<label for="password">Contraseña</label>
						<input id="password" name="password" type="password" required placeholder="Contraseña" />
					</div>
					<p class="helper-text"><a href="forgot-password.html">¿Olvidaste tu contraseña?</a></p>
					<button type="submit" class="btn-primary">Entrar</button>
				</form>
				<p class="signup">¿No tienes cuenta? <a href="register.html">Regístrate</a></p>
			</section>
		</div>
		<div class="right">
			<img class="hero-img" src="../assets/public/hero.png" alt="Ilustración" />
		</div>
	</main>
	<script>
		const params = new URLSearchParams(window.location.search);
		const statusMessage = document.getElementById('statusMessage');
		const reset = params.get('reset');
		const error = params.get('error');

		if (reset === 'success') {
			statusMessage.textContent = 'Tu contraseña se actualizó correctamente. Ya puedes iniciar sesión.';
			statusMessage.className = 'status-message success';
		} else if (error === 'invalid_credentials') {
			statusMessage.textContent = 'Correo o contraseña incorrectos.';
			statusMessage.className = 'status-message error';
		} else if (error === 'missing_fields') {
			statusMessage.textContent = 'Completa correo y contraseña.';
			statusMessage.className = 'status-message error';
		}
	</script>
</body>
</html>
